name: Package Addon

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare package folder
        run: |
          set -euo pipefail
          rm -rf package
          mkdir -p package/NatLust

          rsync -av --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".vscode/" \
            --exclude ".idea/" \
            --exclude ".gitignore" \
            --exclude ".gitattributes" \
            --exclude "package/" \
            --exclude "CHANGELOG.md" \
            --exclude "AGENTS.md" \
            --exclude "scripts/" \
            --exclude "Asset/" \
            --exclude "Media/*" \
            --include "Media/icon.png" \
            --include "Media/" \
            ./ package/NatLust/

          rm -f package/NatLust/Media/.gitkeep
          mkdir -p package/NatLust/Media

          echo "Package content:"
          find package/NatLust -maxdepth 3 -print

      - name: Create zip
        run: |
          set -euo pipefail
          cd package
          ZIP_NAME="../NatLust-${{ github.event.release.tag_name }}.zip"
          zip -r "$ZIP_NAME" NatLust

      - name: Upload zip to release
        uses: softprops/action-gh-release@v2
        with:
          files: NatLust-${{ github.event.release.tag_name }}.zip
